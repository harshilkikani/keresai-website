<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Page not found (404) | Keres AI</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to Keres AI.">
<meta name="robots" content="noindex, follow">

<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; base-uri 'self'; form-action 'self';">

<link rel="icon" type="image/png" href="/assets/img/KeresLogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css?v=5">

<style>
.err-wrap {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
}
.err-code {
  font-family: var(--serif); font-size: clamp(96px, 18vw, 180px);
  line-height: 1; color: var(--orange); font-style: italic; margin-bottom: 12px;
}
.err-title {
  font-family: var(--serif); font-size: clamp(28px, 4vw, 40px);
  font-weight: 400; color: var(--text); margin-bottom: 16px;
  letter-spacing: -0.01em;
}
.err-body {
  font-size: clamp(15px, 1.5vw, 17px); color: var(--text-muted);
  max-width: 500px; line-height: 1.7; margin-bottom: 32px;
}
.err-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
</style>
</head>

<body>
<main class="err-wrap">
  <div class="err-code">404</div>
  <h1 class="err-title">That page wandered off.</h1>
  <p class="err-body">The URL you followed doesn&rsquo;t exist &mdash; it may have moved or never existed. Head back to the homepage or browse our resources.</p>
  <div class="err-actions">
    <a href="/" class="btn btn-primary">Go home</a>
    <a href="/resources.html" class="btn btn-outline">Browse resources</a>
  </div>
</main>
</body>
</html>

# ═════════════════════════════════════════════════
#  Netlify configuration — Keres AI website
#  Static site, no build step
# ═════════════════════════════════════════════════

[build]
  publish = "."
  # No build command — site is pre-built static files
  command = ""

# ─── Security headers (applied to every response) ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "SAMEORIGIN"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection         = "1; mode=block"
    Content-Security-Policy  = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io; frame-src https://calendly.com; form-action 'self' https://formspree.io; base-uri 'self'; frame-ancestors 'self';"

# ─── Long cache for static assets (content-addressed by filename for now) ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ─── HTML should revalidate ───
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Friendly redirects ───
# Strip trailing-slash hash anchors gracefully
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/index"
  to     = "/"
  status = 301

# SPA-style fallback for any unmatched path → homepage
# (optional; remove if you plan to add real sub-pages)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
